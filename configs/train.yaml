experiment:
  name: "market_window_system"

dataset:
  input_file: "data/raw/market_data.csv"
  timestamp_col: "timestamp"
  price_col: "close"
  target_horizon: 5
  target_type: "forward_return"

features:
  include:
    - returns
    - volatility
    - momentum
    - candle_structure
    - volume_zscore
  return_lags: [1, 2, 5]
  vol_windows: [5, 10, 20]
  momentum_windows: [5, 10, 20]
  volume_windows: [5, 20]

windows:
  size: 20
  stride: 1

state_model:
  type: "gmm"
  n_components: 5
  random_state: 42

predictor:
  type: "lightgbm"
  objective: "regression"
  learning_rate: 0.03
  n_estimators: 500
  num_leaves: 31
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42

validation:
  method: "walk_forward"
  n_splits: 5
  train_min_size: 500
  test_size: 120

artifacts:
  output_dir: "models/snapshots/latest"